<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Queue - Discord Memory Vault</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #fbbf24; /* Amber accent for review queue */
            --accent-glow: rgba(251, 191, 36, 0.4);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .review-stats {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="background-animation"></div>
    <div class="top-nav">
        <h1>DR Al_BUM</h1>
        <div class="nav-links">
            <a href="/" class="nav-link">Gallery</a>
            <a href="/review" class="nav-link active">Review Queue</a>
        </div>
    </div>

    <div class="floating-filter-bar" id="filter-bar">
        <div class="filter-content">
            <button id="select-all" class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="m9 12 2 2 4-4" />
                </svg>
                <span>Select All</span>
            </button>
            <div class="vertical-divider"></div>
            <button id="approve-selected-btn" class="action-btn confirm-btn" style="min-width: 120px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
                <span>Approve Selected</span>
            </button>
            <button id="blacklist-selected-btn" class="action-btn danger-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="4.93" x2="19.07" y1="4.93" y2="19.07" />
                </svg>
                <span>Blacklist</span>
            </button>
        </div>
    </div>

    <div class="glass-container">
        <div class="review-header">
            <div>
                <h2>Review Queue</h2>
                <p class="review-stats" id="pending-count">Loading pending items...</p>
            </div>
        </div>
        <div class="gallery-grid" id="gallery">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-close" id="lightbox-close">&times;</div>
    </div>

    <script>
        let selectedHashes = new Set();
        let allPhotos = [];

        async function loadReviewQueue() {
            const res = await fetch('/api/review/photos');
            allPhotos = await res.json();
            renderGallery(allPhotos);
            updateStats();
        }

        function updateStats() {
            const count = allPhotos.length;
            document.getElementById('pending-count').textContent = `${count} items waiting for approval`;
        }

        function renderGallery(photos) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (photos.length === 0) {
                gallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">No items in review queue! Photos from /sync_history will appear here.</div>';
                return;
            }

            photos.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'media-card';
                if (selectedHashes.has(photo.file_hash)) card.classList.add('selected');
                
                const isVideo = photo.file_name.toLowerCase().endsWith('.mp4') || photo.file_name.toLowerCase().endsWith('.mov');
                
                card.innerHTML = `
                    <div class="check-indicator"></div>
                    ${isVideo ? `<video src="${photo.cloud_url}" muted loop></video>` : `<img src="${photo.cloud_url}" loading="lazy">`}
                    <div class="card-footer">
                        <p><strong>${photo.user_name}</strong></p>
                        <p>${photo.file_name}</p>
                    </div>
                `;

                card.onclick = () => {
                    if (selectedHashes.has(photo.file_hash)) {
                        selectedHashes.delete(photo.file_hash);
                        card.classList.remove('selected');
                    } else {
                        selectedHashes.add(photo.file_hash);
                        card.classList.add('selected');
                    }
                };
                
                gallery.appendChild(card);
            });
        }

        document.getElementById('select-all').onclick = () => {
            if (selectedHashes.size === allPhotos.length) {
                selectedHashes.clear();
            } else {
                allPhotos.forEach(p => selectedHashes.add(p.file_hash));
            }
            renderGallery(allPhotos);
        };

        async function processBulk(action) {
            if (selectedHashes.size === 0) return;
            
            const btn = action === 'approve' ? document.getElementById('approve-selected-btn') : document.getElementById('blacklist-selected-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Processing...';
            btn.disabled = true;

            const res = await fetch(`/api/review/${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hashes: Array.from(selectedHashes) })
            });

            if (res.ok) {
                const data = await res.json();
                alert(`Successfully processed ${data.processed} photos!`);
                selectedHashes.clear();
                loadReviewQueue();
            } else {
                alert('Action failed. Check console.');
            }
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        document.getElementById('approve-selected-btn').onclick = () => processBulk('approve');
        document.getElementById('blacklist-selected-btn').onclick = () => processBulk('blacklist');

        // Initial Load
        loadReviewQueue();
    </script>
</body>
</html>
